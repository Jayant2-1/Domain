name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run auth unit tests
        run: python -m pytest tests/test_auth.py -v

      - name: Run API integration tests
        env:
          MLML_MONGODB_URI: mongodb://localhost:27017
          MLML_MONGODB_DB: mlml_test
          MLML_JWT_SECRET: ci-test-secret
          MLML_DB_PATH: data/ci_test.db
        run: python -m pytest tests/test_api.py -v

      - name: Run database tests
        run: python -m pytest tests/test_database.py -v

      - name: Run skill engine tests
        run: python -m pytest tests/test_skill_engine.py -v

      - name: Run RAG tests
        run: python -m pytest tests/test_rag.py -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mlml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
