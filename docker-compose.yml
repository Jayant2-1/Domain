version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-mlml}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASS:-mlml_secret}"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      MLML_MODEL_ID: "${MLML_MODEL_ID:-TinyLlama/TinyLlama-1.1B-Chat-v1.0}"
      MLML_FAISS_INDEX_DIR: "${MLML_FAISS_INDEX_DIR:-faiss_index}"
      MLML_ADAPTER_DIR: "${MLML_ADAPTER_DIR:-}"
      MLML_LOG_LEVEL: "${MLML_LOG_LEVEL:-info}"
      MLML_API_KEY: "${MLML_API_KEY:-}"
      MLML_ALLOWED_ORIGINS: "${MLML_ALLOWED_ORIGINS:-}"
      MLML_DB_PATH: "${MLML_DB_PATH:-data/mlml.db}"
      MLML_MONGODB_URI: "mongodb://${MONGO_USER:-mlml}:${MONGO_PASS:-mlml_secret}@mongo:27017"
      MLML_MONGODB_DB: "${MLML_MONGODB_DB:-mlml}"
      MLML_JWT_SECRET: "${MLML_JWT_SECRET:-change-me-in-production}"
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
      - ./adapters:/app/adapters
      - ./rag/corpus:/app/rag/corpus
      - huggingface_cache:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  huggingface_cache:
  mongo_data:
